<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0d6b5c">
  <title>净值雷达｜基金自选与盘中估值</title>
  <style>
    :root{--bg:#f3f5f0;--card:#fff;--ink:#17201e;--muted:#68736f;--line:#dfe5df;--brand:#0d6b5c;--brand2:#d9eee8;--up:#d74638;--down:#16835f;--shadow:0 12px 34px rgba(25,48,42,.08)}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 90% 0,#dceee8 0,transparent 28%),var(--bg);color:var(--ink);font:15px/1.55 system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    button,input{font:inherit}.shell{width:min(1180px,calc(100% - 32px));margin:auto;padding:30px 0 56px}.top{display:flex;justify-content:space-between;gap:24px;align-items:flex-end;margin-bottom:22px}.eyebrow{color:var(--brand);font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}.top h1{font-size:clamp(28px,5vw,48px);line-height:1.05;margin:6px 0 9px;letter-spacing:-.04em}.top p{color:var(--muted);margin:0}.pill{white-space:nowrap;background:#173f37;color:#fff;border-radius:999px;padding:9px 14px;font-size:12px}
    .panel{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.8);border-radius:22px;box-shadow:var(--shadow)}.add{padding:18px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.input-wrap{display:flex;align-items:center;border:1px solid var(--line);border-radius:14px;background:#fff;padding:0 14px}.input-wrap input{border:0;outline:0;background:transparent;width:100%;height:46px;font-size:17px;letter-spacing:.08em}.button{border:0;border-radius:13px;padding:13px 18px;background:var(--brand);color:#fff;font-weight:750;cursor:pointer}.button:hover{filter:brightness(.94)}.button:disabled{opacity:.55;cursor:wait}.ghost{background:var(--brand2);color:var(--brand)}.message{grid-column:1/-1;min-height:20px;color:var(--muted);font-size:13px}.message.error{color:#aa3028}
    .section-head{display:flex;justify-content:space-between;align-items:center;margin:28px 2px 12px}.section-head h2{font-size:19px;margin:0}.section-head span{font-size:13px;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.fund-card{padding:18px;border:1px solid transparent;cursor:pointer;transition:.18s}.fund-card:hover{transform:translateY(-2px);border-color:#b9d8cf}.card-top{display:flex;justify-content:space-between;gap:12px}.fund-name{font-weight:780;font-size:16px}.code,.meta{font-size:12px;color:var(--muted)}.estimate{font-size:30px;font-weight:820;letter-spacing:-.03em;margin:16px 0 2px}.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--muted)}.card-bottom{display:flex;justify-content:space-between;gap:8px;align-items:end}.tag{font-size:11px;background:#edf2ef;color:#52605b;border-radius:999px;padding:4px 8px}.remove{border:0;background:transparent;color:#8a9490;cursor:pointer;padding:4px}.skeleton{height:132px;background:linear-gradient(90deg,#edf0ed,#f8faf8,#edf0ed);background-size:200% 100%;animation:shimmer 1.2s infinite}@keyframes shimmer{to{background-position:-200% 0}}
    .empty{grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--muted)}.empty strong{display:block;color:var(--ink);font-size:18px;margin-bottom:6px}.detail{margin-top:16px;padding:22px;display:none}.detail.open{display:block}.detail-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.detail h2{margin:0 0 3px;font-size:24px}.close{border:0;background:#eef2ef;width:34px;height:34px;border-radius:50%;cursor:pointer}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}.metric{background:#f5f7f4;border-radius:14px;padding:13px}.metric label{display:block;color:var(--muted);font-size:11px}.metric b{font-size:18px}.chart-wrap{height:290px;border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}.chart-wrap canvas{width:100%;height:100%}.subgrid{display:grid;grid-template-columns:1.25fr .75fr;gap:14px;margin-top:14px}.box{border:1px solid var(--line);border-radius:16px;padding:16px;overflow:auto}.box h3{font-size:15px;margin:0 0 10px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:9px 7px;border-bottom:1px solid #edf0ed;white-space:nowrap}th{color:var(--muted);font-weight:600}.note{background:#eff6f3;border-radius:14px;padding:13px;color:#50615b;font-size:13px}.footer{color:var(--muted);font-size:12px;text-align:center;margin-top:28px}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(2,1fr)}.subgrid{grid-template-columns:1fr}}
    @media(max-width:620px){.shell{width:min(100% - 20px,1180px);padding-top:20px}.top{display:block}.pill{display:inline-block;margin-top:14px}.add{grid-template-columns:1fr}.button{width:100%}.grid{grid-template-columns:1fr}.detail{padding:16px}.metrics{grid-template-columns:repeat(2,1fr)}.chart-wrap{height:230px}.hide-mobile{display:none}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div><div class="eyebrow">Fund Valuation Lab</div><h1>净值雷达</h1><p>把公开持仓和实时行情拼成一张更及时的基金观察表。</p></div>
      <div class="pill">个人原型 · 非投资建议</div>
    </header>

    <section class="panel add" aria-label="添加基金">
      <div class="input-wrap"><input id="fundInput" inputmode="numeric" maxlength="6" placeholder="输入6位基金代码，例如 026211" aria-label="基金代码"></div>
      <button id="addButton" class="button">验证并添加</button>
      <div id="message" class="message">第一次体验？<button id="exampleButton" class="remove" style="color:var(--brand)">添加示例 026211</button></div>
    </section>

    <div class="section-head"><h2>我的自选</h2><span id="watchCount">0 只基金</span></div>
    <section id="watchlist" class="grid" aria-live="polite"></section>

    <section id="detail" class="panel detail" aria-live="polite">
      <div id="detailContent"></div>
    </section>

    <footer class="footer">估值会按基金类型选择ETF实时行情或公开持仓策略，结果不代表基金公司正式净值。</footer>
  </main>
  <script>
    const STORAGE_KEY='funding-demo-watchlist-v1';
    const state={codes:JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'),detailCode:null,chartPoints:[]};
    const $=id=>document.getElementById(id);
    const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const fmtPct=v=>v==null?'--':`${v>=0?'+':''}${Number(v).toFixed(2)}%`;
    const cls=v=>v>0?'up':v<0?'down':'flat';

    async function api(path){const r=await fetch(path);let body;try{body=await r.json()}catch{body={detail:'响应格式异常'}}if(!r.ok)throw new Error(body.detail||`请求失败 ${r.status}`);return body}
    function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.codes))}
    function message(text,error=false){$('message').className=`message${error?' error':''}`;$('message').textContent=text}
    async function addFund(raw){const code=String(raw||'').trim();if(!/^\d{6}$/.test(code)){message('请输入6位基金代码。',true);return}$('addButton').disabled=true;message('正在验证基金…');try{const data=await api(`/api/funds/${code}/validate`);if(!data.exists)throw new Error(data.message||'基金不存在');if(!state.codes.includes(code)){state.codes.unshift(code);save()}message(`已添加：${data.name}`);$('fundInput').value='';renderWatchlist();openDetail(code)}catch(e){message(e.message,true)}finally{$('addButton').disabled=false}}
    function removeFund(code,event){event.stopPropagation();state.codes=state.codes.filter(item=>item!==code);save();if(state.detailCode===code){$('detail').classList.remove('open');state.detailCode=null}renderWatchlist()}

    async function renderWatchlist(){const root=$('watchlist');$('watchCount').textContent=`${state.codes.length} 只基金`;if(!state.codes.length){root.innerHTML='<div class="panel empty"><strong>还没有自选基金</strong>输入基金代码，验证通过后会出现在这里。</div>';return}root.innerHTML=state.codes.map(code=>`<article class="panel fund-card" id="card-${code}" onclick="openDetail('${code}')"><div class="skeleton"></div></article>`).join('');state.codes.forEach(loadCard)}
    async function loadCard(code){const node=$(`card-${code}`);if(!node)return;try{const [fund,estimate]=await Promise.all([api(`/api/funds/${code}/overview`),api(`/api/funds/${code}/estimate`)]);const available=estimate.status==='ok';const pct=available?estimate.estimated_change_pct:null;node.innerHTML=`<div class="card-top"><div><div class="fund-name">${esc(fund.name)}</div><div class="code">${esc(code)} · ${esc(fund.type||'类型未知')}</div></div><button class="remove" aria-label="移除" onclick="removeFund('${code}',event)">移除</button></div><div class="estimate ${cls(pct)}">${available?fmtPct(pct):'估值暂不可用'}</div><div class="card-bottom"><div class="meta">净值 ${Number(fund.latest_nav).toFixed(4)} · ${esc(fund.latest_nav_date)}</div><span class="tag">${available?`覆盖 ${(estimate.coverage_ratio*100).toFixed(0)}%`:'可看历史'}</span></div>`}catch(e){node.innerHTML=`<div class="card-top"><div><div class="fund-name">${esc(code)}</div><div class="code">加载失败</div></div><button class="remove" onclick="removeFund('${code}',event)">移除</button></div><p class="meta">${esc(e.message)}</p>`}}

    async function openDetail(code){state.detailCode=code;const panel=$('detail');const content=$('detailContent');panel.classList.add('open');content.innerHTML='<div class="skeleton"></div>';panel.scrollIntoView({behavior:'smooth',block:'start'});try{const [fund,history,estimate]=await Promise.all([api(`/api/funds/${code}/overview`),api(`/api/funds/${code}/history`),api(`/api/funds/${code}/estimate`)]);if(state.detailCode!==code)return;state.chartPoints=history.points;const ok=estimate.status==='ok';const rows=ok?estimate.contributions.map(x=>`<tr><td>${esc(x.name)}</td><td>${esc(x.market)} ${esc(x.code)}</td><td>${Number(x.weight_pct).toFixed(2)}%</td><td class="${cls(x.change_pct)}">${fmtPct(x.change_pct)}</td><td class="${cls(x.contribution_pct)}">${fmtPct(x.contribution_pct)}</td></tr>`).join(''):'';content.innerHTML=`<div class="detail-head"><div><h2>${esc(fund.name)}</h2><div class="meta">${esc(code)} · ${esc(fund.type||'类型未知')} · 共 ${history.count} 个净值点</div></div><button class="close" onclick="closeDetail()" aria-label="关闭">×</button></div><div class="metrics"><div class="metric"><label>盘中预测涨跌</label><b class="${cls(ok?estimate.estimated_change_pct:0)}">${ok?fmtPct(estimate.estimated_change_pct):'--'}</b></div><div class="metric"><label>预测单位净值</label><b>${ok?Number(estimate.estimated_nav).toFixed(4):'--'}</b></div><div class="metric"><label>最新正式净值</label><b>${Number(fund.latest_nav).toFixed(4)}</b></div><div class="metric"><label>估值置信度</label><b>${ok?esc(estimate.confidence):'不可用'}</b></div></div><div class="chart-wrap"><canvas id="navChart" aria-label="历史单位净值曲线"></canvas></div><div class="subgrid"><div class="box"><h3>持仓贡献</h3>${ok?`<table><thead><tr><th>股票</th><th>市场/代码</th><th>持仓</th><th>涨跌</th><th>贡献</th></tr></thead><tbody>${rows}</tbody></table>`:`<div class="note">${esc(estimate.reason||'当前无法计算盘中估值。')}</div>`}</div><div class="box"><h3>模型说明</h3><div class="note">${ok?`策略：${esc(estimate.strategy_label)}。数据源：${esc(estimate.estimate_source)}${estimate.fallback_used?'（已降级）':''}。${estimate.position_report_date?`季报仓位 ${(estimate.equity_exposure*100).toFixed(2)}%（${esc(estimate.position_report_date)}）`:`ETF场内行情直接反映整体涨跌`}，行情覆盖 ${Number(estimate.covered_weight_pct).toFixed(2)}%。${esc(estimate.confidence_reason||'')} 仓位来源：${esc(estimate.position_source||'--')}`:'基本信息和历史净值仍然可用。'}</div><p class="meta">基准净值日期：${ok?esc(estimate.base_nav_date):esc(fund.latest_nav_date)}</p><p class="meta">估值标的/持仓来源：${ok?esc(estimate.holding_source_code):'--'}</p></div></div>`;requestAnimationFrame(drawChart)}catch(e){content.innerHTML=`<div class="detail-head"><h2>加载失败</h2><button class="close" onclick="closeDetail()">×</button></div><p>${esc(e.message)}</p>`}}
    function closeDetail(){$('detail').classList.remove('open');state.detailCode=null}
    function drawChart(){const canvas=$('navChart');if(!canvas||!state.chartPoints.length)return;const dpr=window.devicePixelRatio||1;const rect=canvas.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;const c=canvas.getContext('2d');c.scale(dpr,dpr);const w=rect.width,h=rect.height,p={l:44,r:14,t:14,b:28};const points=state.chartPoints;const vals=points.map(x=>Number(x.unit_nav));let min=Math.min(...vals),max=Math.max(...vals);if(max===min){max+=1;min-=1}const x=i=>p.l+i/(points.length-1||1)*(w-p.l-p.r);const y=v=>p.t+(max-v)/(max-min)*(h-p.t-p.b);c.clearRect(0,0,w,h);c.strokeStyle='#e4e9e5';c.lineWidth=1;for(let i=0;i<4;i++){const yy=p.t+i/3*(h-p.t-p.b);c.beginPath();c.moveTo(p.l,yy);c.lineTo(w-p.r,yy);c.stroke();c.fillStyle='#7a8581';c.font='11px system-ui';c.fillText((max-i/3*(max-min)).toFixed(3),2,yy+4)}const grad=c.createLinearGradient(0,p.t,0,h-p.b);grad.addColorStop(0,'rgba(13,107,92,.25)');grad.addColorStop(1,'rgba(13,107,92,0)');c.beginPath();points.forEach((pt,i)=>{const xx=x(i),yy=y(Number(pt.unit_nav));i?c.lineTo(xx,yy):c.moveTo(xx,yy)});c.lineTo(x(points.length-1),h-p.b);c.lineTo(x(0),h-p.b);c.closePath();c.fillStyle=grad;c.fill();c.beginPath();points.forEach((pt,i)=>{const xx=x(i),yy=y(Number(pt.unit_nav));i?c.lineTo(xx,yy):c.moveTo(xx,yy)});c.strokeStyle='#0d6b5c';c.lineWidth=2;c.stroke();c.fillStyle='#7a8581';c.font='11px system-ui';c.fillText(points[0].date,p.l,h-7);const last=points[points.length-1].date;c.fillText(last,w-p.r-c.measureText(last).width,h-7)}
    $('addButton').addEventListener('click',()=>addFund($('fundInput').value));$('fundInput').addEventListener('keydown',e=>{if(e.key==='Enter')addFund(e.target.value)});$('exampleButton').addEventListener('click',()=>addFund('026211'));window.addEventListener('resize',()=>{if(state.detailCode)drawChart()});renderWatchlist();
  </script>
</body>
</html>
