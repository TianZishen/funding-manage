<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0d6b5c">
  <title>净值雷达｜基金自选与盘中估值</title>
  <style>
    :root{--bg:#f3f5f0;--card:#fff;--ink:#17201e;--muted:#68736f;--line:#dfe5df;--brand:#0d6b5c;--brand2:#d9eee8;--up:#d74638;--down:#16835f;--shadow:0 12px 34px rgba(25,48,42,.08)}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 90% 0,#dceee8 0,transparent 28%),var(--bg);color:var(--ink);font:15px/1.55 system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    button,input{font:inherit}.shell{width:min(1180px,calc(100% - 32px));margin:auto;padding:30px 0 56px}.top{display:flex;justify-content:space-between;gap:24px;align-items:flex-end;margin-bottom:22px}.eyebrow{color:var(--brand);font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}.top h1{font-size:clamp(28px,5vw,48px);line-height:1.05;margin:6px 0 9px;letter-spacing:-.04em}.top p{color:var(--muted);margin:0}.pill{white-space:nowrap;background:#173f37;color:#fff;border-radius:999px;padding:9px 14px;font-size:12px}
    .panel{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.8);border-radius:22px;box-shadow:var(--shadow)}.add{padding:18px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.input-wrap{display:flex;align-items:center;border:1px solid var(--line);border-radius:14px;background:#fff;padding:0 14px}.input-wrap input{border:0;outline:0;background:transparent;width:100%;height:46px;font-size:17px;letter-spacing:.08em}.button{border:0;border-radius:13px;padding:13px 18px;background:var(--brand);color:#fff;font-weight:750;cursor:pointer}.button:hover{filter:brightness(.94)}.button:disabled{opacity:.55;cursor:wait}.ghost{background:var(--brand2);color:var(--brand)}.message{grid-column:1/-1;min-height:20px;color:var(--muted);font-size:13px}.message.error{color:#aa3028}
    .section-head{display:flex;justify-content:space-between;align-items:center;margin:28px 2px 12px}.section-head h2{font-size:19px;margin:0}.section-head span{font-size:13px;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.fund-card{padding:18px;border:1px solid transparent;cursor:pointer;transition:.18s}.fund-card:hover{transform:translateY(-2px);border-color:#b9d8cf}.card-top{display:flex;justify-content:space-between;gap:12px}.fund-name{font-weight:780;font-size:16px}.code,.meta{font-size:12px;color:var(--muted)}.estimate{font-size:30px;font-weight:820;letter-spacing:-.03em;margin:16px 0 2px}.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--muted)}.card-bottom{display:flex;justify-content:space-between;gap:8px;align-items:end}.tag{font-size:11px;background:#edf2ef;color:#52605b;border-radius:999px;padding:4px 8px}.position-line{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:10px 0 2px;padding-top:10px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}.cost-button{border:0;background:var(--brand2);color:var(--brand);border-radius:9px;padding:4px 8px;cursor:pointer;font-size:11px}.remove{border:0;background:transparent;color:#8a9490;cursor:pointer;padding:4px}.skeleton{height:132px;background:linear-gradient(90deg,#edf0ed,#f8faf8,#edf0ed);background-size:200% 100%;animation:shimmer 1.2s infinite}@keyframes shimmer{to{background-position:-200% 0}}
    .empty{grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--muted)}.empty strong{display:block;color:var(--ink);font-size:18px;margin-bottom:6px}.detail{margin-top:16px;padding:22px;display:none}.detail.open{display:block}.detail-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.detail h2{margin:0 0 3px;font-size:24px}.close{border:0;background:#eef2ef;width:34px;height:34px;border-radius:50%;cursor:pointer}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}.metric{background:#f5f7f4;border-radius:14px;padding:13px}.metric label{display:block;color:var(--muted);font-size:11px}.metric b{font-size:18px}.chart-panel{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden}.chart-toolbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;padding:14px 16px 10px;border-bottom:1px solid #edf0ed}.chart-title{font-weight:780}.chart-stats{display:flex;gap:14px;flex-wrap:wrap;margin-top:3px;color:var(--muted);font-size:11px}.chart-stats b{color:var(--ink);font-size:12px}.range-tabs{display:flex;gap:4px;background:#f1f4f1;border-radius:10px;padding:3px}.range-button{border:0;background:transparent;color:var(--muted);border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer}.range-button.active{background:#fff;color:var(--brand);box-shadow:0 2px 8px rgba(25,48,42,.12);font-weight:750}.chart-wrap{height:310px;position:relative;padding:10px 12px 8px}.chart-wrap canvas{width:100%;height:100%;display:block;touch-action:pan-y;outline:none}.chart-wrap canvas:focus-visible{box-shadow:inset 0 0 0 2px var(--brand);border-radius:10px}.chart-tooltip{position:absolute;display:none;z-index:2;pointer-events:none;min-width:132px;padding:9px 11px;border-radius:11px;background:rgba(23,32,30,.94);color:#fff;font-size:11px;line-height:1.45;box-shadow:0 8px 24px rgba(0,0,0,.18)}.chart-tooltip b{display:block;font-size:14px}.chart-hint{padding:0 16px 11px;color:var(--muted);font-size:11px}.subgrid{display:grid;grid-template-columns:1.25fr .75fr;gap:14px;margin-top:14px}.box{border:1px solid var(--line);border-radius:16px;padding:16px;overflow:auto}.box h3{font-size:15px;margin:0 0 10px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:9px 7px;border-bottom:1px solid #edf0ed;white-space:nowrap}th{color:var(--muted);font-weight:600}.note{background:#eff6f3;border-radius:14px;padding:13px;color:#50615b;font-size:13px}.footer{color:var(--muted);font-size:12px;text-align:center;margin-top:28px}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(2,1fr)}.subgrid{grid-template-columns:1fr}}
    @media(max-width:620px){.shell{width:min(100% - 20px,1180px);padding-top:20px}.top{display:block}.pill{display:inline-block;margin-top:14px}.add{grid-template-columns:1fr}.button{width:100%}.grid{grid-template-columns:1fr}.detail{padding:16px}.metrics{grid-template-columns:repeat(2,1fr)}.chart-toolbar{display:block}.range-tabs{margin-top:10px;width:max-content}.chart-stats{gap:9px}.chart-wrap{height:270px;padding-left:6px;padding-right:8px}.chart-hint{display:none}.hide-mobile{display:none}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div><div class="eyebrow">Fund Valuation Lab</div><h1>净值雷达</h1><p>把公开持仓和实时行情拼成一张更及时的基金观察表。</p></div>
      <div class="pill">个人原型 · 非投资建议</div>
    </header>

    <section class="panel add" aria-label="添加基金">
      <div class="input-wrap"><input id="fundInput" inputmode="numeric" maxlength="6" placeholder="输入6位基金代码，例如 026211" aria-label="基金代码"></div>
      <button id="addButton" class="button">验证并添加</button>
      <div id="message" class="message">第一次体验？<button id="exampleButton" class="remove" style="color:var(--brand)">添加示例 026211</button></div>
    </section>

    <div class="section-head"><h2>我的自选</h2><span id="watchCount">0 只基金</span></div>
    <section id="watchlist" class="grid" aria-live="polite"></section>

    <section id="detail" class="panel detail" aria-live="polite">
      <div id="detailContent"></div>
    </section>

    <footer class="footer">估值会按基金类型选择ETF实时行情或公开持仓策略，结果不代表基金公司正式净值。</footer>
  </main>
  <script>
    const STORAGE_KEY='funding-demo-watchlist-v1';
    const COST_STORAGE_KEY='funding-demo-costs-v1';
    const state={codes:JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'),costs:JSON.parse(localStorage.getItem(COST_STORAGE_KEY)||'{}'),detailCode:null,chartPoints:[],chartRange:'1y',chartHover:null};
    const $=id=>document.getElementById(id);
    const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const fmtPct=v=>v==null?'--':`${v>=0?'+':''}${Number(v).toFixed(2)}%`;
    const cls=v=>v>0?'up':v<0?'down':'flat';

    async function api(path){const r=await fetch(path);let body;try{body=await r.json()}catch{body={detail:'响应格式异常'}}if(!r.ok)throw new Error(body.detail||`请求失败 ${r.status}`);return body}
    function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.codes))}
    function saveCosts(){localStorage.setItem(COST_STORAGE_KEY,JSON.stringify(state.costs))}
    function positionOf(code){
      const stored=state.costs[code];
      const costNav=Number(typeof stored==='object'?stored.costNav:stored);
      const shares=Number(typeof stored==='object'?stored.shares:null);
      return {costNav:Number.isFinite(costNav)&&costNav>0?costNav:null,shares:Number.isFinite(shares)&&shares>0?shares:null};
    }
    function profitOf(code,currentNav){
      const position=positionOf(code),nav=Number(currentNav);
      if(!position.costNav||!position.shares||!Number.isFinite(nav))return null;
      return {amount:(nav-position.costNav)*position.shares,pct:(nav/position.costNav-1)*100};
    }
    const fmtMoney=value=>value==null?'--':`${value>=0?'+':'-'}¥${Math.abs(Number(value)).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
    function editCost(code,event){
      if(event)event.stopPropagation();
      const current=positionOf(code);
      const sharesRaw=window.prompt('请输入当前持仓份额；两项都留空可清除持仓',current.shares==null?'':String(current.shares));
      if(sharesRaw===null)return;
      const costRaw=window.prompt('请输入每份成本净值；两项都留空可清除持仓',current.costNav==null?'':String(current.costNav));
      if(costRaw===null)return;
      const sharesValue=String(sharesRaw).trim(),costValue=String(costRaw).trim();
      if(!sharesValue&&!costValue){delete state.costs[code];saveCosts();renderWatchlist();if(state.detailCode===code)openDetail(code);return}
      const shares=Number(sharesValue),costNav=Number(costValue);
      if(!Number.isFinite(shares)||shares<=0){window.alert('持仓份额必须是大于 0 的数字');return}
      if(!Number.isFinite(costNav)||costNav<=0){window.alert('成本净值必须是大于 0 的数字');return}
      state.costs[code]={shares,costNav};saveCosts();renderWatchlist();if(state.detailCode===code)openDetail(code);
    }
    function message(text,error=false){$('message').className=`message${error?' error':''}`;$('message').textContent=text}
    async function addFund(raw){const code=String(raw||'').trim();if(!/^\d{6}$/.test(code)){message('请输入6位基金代码。',true);return}$('addButton').disabled=true;message('正在验证基金…');try{const data=await api(`/api/funds/${code}/validate`);if(!data.exists)throw new Error(data.message||'基金不存在');if(!state.codes.includes(code)){state.codes.unshift(code);save()}message(`已添加：${data.name}`);$('fundInput').value='';renderWatchlist();openDetail(code)}catch(e){message(e.message,true)}finally{$('addButton').disabled=false}}
    function removeFund(code,event){event.stopPropagation();state.codes=state.codes.filter(item=>item!==code);save();if(state.detailCode===code){$('detail').classList.remove('open');state.detailCode=null}renderWatchlist()}

    async function renderWatchlist(){const root=$('watchlist');$('watchCount').textContent=`${state.codes.length} 只基金`;if(!state.codes.length){root.innerHTML='<div class="panel empty"><strong>还没有自选基金</strong>输入基金代码，验证通过后会出现在这里。</div>';return}root.innerHTML=state.codes.map(code=>`<article class="panel fund-card" id="card-${code}" onclick="openDetail('${code}')"><div class="skeleton"></div></article>`).join('');state.codes.forEach(loadCard)}
    async function loadCard(code){
      const node=$(`card-${code}`);if(!node)return;
      try{
        const fund=await api(`/api/funds/${code}/overview`);
        const intraday=fund.display_mode==='intraday';
        const estimate=intraday?await api(`/api/funds/${code}/estimate`):null;
        const available=intraday&&estimate.status==='ok';
        const pct=intraday?(available?estimate.estimated_change_pct:null):fund.latest_daily_return_pct;
        const value=intraday
          ?(available?fmtPct(pct):'盘中估值不可用')
          :fmtPct(pct);
        const meta=intraday
          ?`预计净值 ${available?Number(estimate.estimated_nav).toFixed(4):'--'} · 上日净值 ${Number(fund.latest_nav).toFixed(4)}`
          :`最新净值 ${Number(fund.latest_nav).toFixed(4)} · 上日净值 ${fund.previous_nav==null?'--':Number(fund.previous_nav).toFixed(4)}`;
        const tag=intraday
          ?(available?'盘中估算':'估值不可用')
          :`正式净值 · ${esc(fund.latest_nav_date)}`;
        const currentNav=intraday&&available?estimate.estimated_nav:fund.latest_nav;
        const holding=positionOf(code),profit=profitOf(code,currentNav);
        const position=`<div class="position-line"><span>${holding.shares==null?'未设置持仓':`${holding.shares.toLocaleString('zh-CN')} 份 · 成本 ${holding.costNav.toFixed(4)}`} · 总盈利 <b class="${cls(profit?.amount)}">${fmtMoney(profit?.amount)}</b> <b class="${cls(profit?.pct)}">(${fmtPct(profit?.pct)})</b></span><button class="cost-button" onclick="editCost('${code}',event)">${holding.shares==null?'设置持仓':'修改持仓'}</button></div>`;
        node.innerHTML=`<div class="card-top"><div><div class="fund-name">${esc(fund.name)}</div><div class="code">${esc(code)} · ${esc(fund.type||'类型未知')}</div></div><button class="remove" aria-label="移除" onclick="removeFund('${code}',event)">移除</button></div><div class="estimate ${cls(pct)}">${value}</div>${position}<div class="card-bottom"><div class="meta">${meta}</div><span class="tag">${tag}</span></div>`;
      }catch(e){node.innerHTML=`<div class="card-top"><div><div class="fund-name">${esc(code)}</div><div class="code">加载失败</div></div><button class="remove" onclick="removeFund('${code}',event)">移除</button></div><p class="meta">${esc(e.message)}</p>`}
    }

    async function openDetail(code){
      state.detailCode=code;const panel=$('detail');const content=$('detailContent');
      panel.classList.add('open');content.innerHTML='<div class="skeleton"></div>';panel.scrollIntoView({behavior:'smooth',block:'start'});
      try{
        const [fund,history]=await Promise.all([api(`/api/funds/${code}/overview`),api(`/api/funds/${code}/history`)]);
        if(state.detailCode!==code)return;
        const intraday=fund.display_mode==='intraday';
        const estimate=intraday?await api(`/api/funds/${code}/estimate`):null;
        if(state.detailCode!==code)return;
        state.chartPoints=history.points;
        const ok=intraday&&estimate.status==='ok';
        const rows=ok?estimate.contributions.map(x=>`<tr><td>${esc(x.name)}</td><td>${esc(x.market)} ${esc(x.code)}</td><td>${Number(x.weight_pct).toFixed(2)}%</td><td class="${cls(x.change_pct)}">${fmtPct(x.change_pct)}</td><td class="${cls(x.contribution_pct)}">${fmtPct(x.contribution_pct)}</td></tr>`).join(''):'';
        const metrics=intraday
          ?`<div class="metric"><label>盘中预计涨跌</label><b class="${cls(ok?estimate.estimated_change_pct:0)}">${ok?fmtPct(estimate.estimated_change_pct):'--'}</b></div><div class="metric"><label>预计净值</label><b>${ok?Number(estimate.estimated_nav).toFixed(4):'--'}</b></div><div class="metric"><label>上日净值 · ${esc(fund.latest_nav_date)}</label><b>${Number(fund.latest_nav).toFixed(4)}</b></div>`
          :`<div class="metric"><label>正式涨跌 · ${esc(fund.latest_nav_date)}</label><b class="${cls(fund.latest_daily_return_pct)}">${fmtPct(fund.latest_daily_return_pct)}</b></div><div class="metric"><label>最新正式净值</label><b>${Number(fund.latest_nav).toFixed(4)}</b></div><div class="metric"><label>上日净值 · ${esc(fund.previous_nav_date||'--')}</label><b>${fund.previous_nav==null?'--':Number(fund.previous_nav).toFixed(4)}</b></div>`;
        const currentNav=intraday&&ok?estimate.estimated_nav:fund.latest_nav;
        const holding=positionOf(code),profit=profitOf(code,currentNav);
        const profitMetric=`<div class="metric"><label>总盈利 · ${intraday&&ok?'按预计净值':'按正式净值'}</label><b class="${cls(profit?.amount)}">${fmtMoney(profit?.amount)}</b><span class="${cls(profit?.pct)}" style="display:block;font-size:12px;margin-top:2px">盈利率 ${fmtPct(profit?.pct)}</span><button class="cost-button" style="display:block;margin-top:6px" onclick="editCost('${code}',event)">${holding.shares==null?'设置持仓':`${holding.shares.toLocaleString('zh-CN')} 份 · 成本 ${holding.costNav.toFixed(4)}`}</button></div>`;
        const contribution=intraday
          ?(ok?`<table><thead><tr><th>股票</th><th>市场/代码</th><th>持仓</th><th>涨跌</th><th>贡献</th></tr></thead><tbody>${rows}</tbody></table>`:`<div class="note">${esc(estimate.reason||'当前无法计算盘中估值。')}</div>`)
          :'<div class="note">盘后展示基金公司公布的正式净值与正式涨跌，不再计算持仓估值。</div>';
        const explanation=intraday&&ok
          ?`策略：${esc(estimate.strategy_label)}。数据源：${esc(estimate.estimate_source)}${estimate.fallback_used?'（已降级）':''}。${estimate.position_report_date?`季报仓位 ${(estimate.equity_exposure*100).toFixed(2)}%（${esc(estimate.position_report_date)}）`:'ETF场内行情直接反映整体涨跌'}，行情覆盖 ${Number(estimate.covered_weight_pct).toFixed(2)}%。${esc(estimate.confidence_reason||'')} 仓位来源：${esc(estimate.position_source||'--')}`
          :intraday?'盘中估值当前不可用，仍可查看正式净值与历史走势。':`当前为盘后模式，展示 ${esc(fund.latest_nav_date)} 公布的正式数据。`;
        content.innerHTML=`<div class="detail-head"><div><h2>${esc(fund.name)}</h2><div class="meta">${esc(code)} · ${esc(fund.type||'类型未知')} · 共 ${history.count} 个净值点</div></div><button class="close" onclick="closeDetail()" aria-label="关闭">×</button></div><div class="metrics">${metrics}${profitMetric}</div><div class="chart-panel"><div class="chart-toolbar"><div><div class="chart-title">历史净值走势</div><div id="chartStats" class="chart-stats"></div></div><div class="range-tabs" aria-label="图表时间范围"><button class="range-button" data-range="1m" onclick="setChartRange('1m')">1月</button><button class="range-button" data-range="3m" onclick="setChartRange('3m')">3月</button><button class="range-button active" data-range="1y" onclick="setChartRange('1y')">1年</button><button class="range-button" data-range="all" onclick="setChartRange('all')">全部</button></div></div><div class="chart-wrap"><canvas id="navChart" tabindex="0" aria-label="可交互历史单位净值曲线，使用左右方向键查看数据点"></canvas><div id="chartTooltip" class="chart-tooltip"></div></div><div class="chart-hint">移动鼠标或手指查看每日净值；聚焦图表后可使用左右方向键。</div></div><div class="subgrid"><div class="box"><h3>${intraday?'持仓贡献':'正式数据'}</h3>${contribution}</div><div class="box"><h3>数据说明</h3><div class="note">${explanation}</div><p class="meta">${intraday&&ok?`基准净值日期：${esc(estimate.base_nav_date)}`:`最新净值日期：${esc(fund.latest_nav_date)}`}</p></div></div>`;
        requestAnimationFrame(()=>{bindChartInteractions();setChartRange(state.chartRange)});
      }catch(e){content.innerHTML=`<div class="detail-head"><h2>加载失败</h2><button class="close" onclick="closeDetail()">×</button></div><p>${esc(e.message)}</p>`}
    }
    function closeDetail(){$('detail').classList.remove('open');state.detailCode=null}
    function chartPointsForRange(){
      const points=state.chartPoints;if(!points.length||state.chartRange==='all')return points;
      const days={"1m":31,"3m":93,"1y":366}[state.chartRange]||366;
      const end=new Date(`${points[points.length-1].date}T00:00:00`);const start=new Date(end);start.setDate(start.getDate()-days);
      return points.filter(point=>new Date(`${point.date}T00:00:00`)>=start);
    }
    function setChartRange(range){
      state.chartRange=range;state.chartHover=null;
      document.querySelectorAll('.range-button').forEach(button=>button.classList.toggle('active',button.dataset.range===range));
      drawChart();
    }
    function updateChartStats(points){
      const root=$('chartStats');if(!root||!points.length)return;
      const values=points.map(point=>Number(point.unit_nav));const first=values[0],last=values[values.length-1];
      const change=first?(last/first-1)*100:null;const high=Math.max(...values),low=Math.min(...values);
      root.innerHTML=`<span>区间涨跌 <b class="${cls(change)}">${fmtPct(change)}</b></span><span>最高 <b>${high.toFixed(4)}</b></span><span>最低 <b>${low.toFixed(4)}</b></span><span>${points.length} 个净值点</span>`;
    }
    function bindChartInteractions(){
      const canvas=$('navChart');if(!canvas||canvas.dataset.bound)return;canvas.dataset.bound='1';
      const locate=event=>{const points=chartPointsForRange();if(!points.length)return;const rect=canvas.getBoundingClientRect();const paddingLeft=52,paddingRight=14;const raw=(event.clientX-rect.left-paddingLeft)/Math.max(1,rect.width-paddingLeft-paddingRight);state.chartHover=Math.max(0,Math.min(points.length-1,Math.round(raw*(points.length-1))));drawChart()};
      canvas.addEventListener('pointermove',locate);canvas.addEventListener('pointerdown',locate);
      canvas.addEventListener('pointerleave',()=>{state.chartHover=null;drawChart()});
      canvas.addEventListener('keydown',event=>{if(!['ArrowLeft','ArrowRight'].includes(event.key))return;event.preventDefault();const points=chartPointsForRange();const fallback=points.length-1;state.chartHover=Math.max(0,Math.min(fallback,(state.chartHover??fallback)+(event.key==='ArrowRight'?1:-1)));drawChart()});
    }
    function drawChart(){
      const canvas=$('navChart'),tooltip=$('chartTooltip');if(!canvas)return;
      const points=chartPointsForRange();if(!points.length)return;updateChartStats(points);
      const dpr=window.devicePixelRatio||1,rect=canvas.getBoundingClientRect(),w=rect.width,h=rect.height,p={l:52,r:14,t:16,b:28};
      canvas.width=Math.round(w*dpr);canvas.height=Math.round(h*dpr);const c=canvas.getContext('2d');c.scale(dpr,dpr);c.clearRect(0,0,w,h);
      const values=points.map(point=>Number(point.unit_nav));let min=Math.min(...values),max=Math.max(...values);const pad=Math.max((max-min)*.08,max*.002);min-=pad;max+=pad;if(max===min){max+=1;min-=1}
      const x=index=>p.l+index/(points.length-1||1)*(w-p.l-p.r),y=value=>p.t+(max-value)/(max-min)*(h-p.t-p.b);
      c.font='11px "Segoe UI",sans-serif';c.lineWidth=1;
      for(let index=0;index<5;index++){const yy=p.t+index/4*(h-p.t-p.b),label=max-index/4*(max-min);c.strokeStyle='#edf1ee';c.beginPath();c.moveTo(p.l,yy);c.lineTo(w-p.r,yy);c.stroke();c.fillStyle='#7a8581';c.fillText(label.toFixed(3),4,yy+4)}
      const labelCount=w<520?3:5;for(let index=0;index<labelCount;index++){const pointIndex=Math.round(index/(labelCount-1)*(points.length-1)),label=points[pointIndex].date.slice(5),xx=x(pointIndex);c.fillStyle='#7a8581';const width=c.measureText(label).width;c.fillText(label,Math.max(p.l,Math.min(w-p.r-width,xx-width/2)),h-7)}
      const gradient=c.createLinearGradient(0,p.t,0,h-p.b);gradient.addColorStop(0,'rgba(13,107,92,.24)');gradient.addColorStop(1,'rgba(13,107,92,.015)');
      c.beginPath();points.forEach((point,index)=>index?c.lineTo(x(index),y(Number(point.unit_nav))):c.moveTo(x(index),y(Number(point.unit_nav))));c.lineTo(x(points.length-1),h-p.b);c.lineTo(x(0),h-p.b);c.closePath();c.fillStyle=gradient;c.fill();
      c.beginPath();points.forEach((point,index)=>index?c.lineTo(x(index),y(Number(point.unit_nav))):c.moveTo(x(index),y(Number(point.unit_nav))));c.strokeStyle='#0d6b5c';c.lineWidth=2.2;c.lineJoin='round';c.stroke();
      if(state.chartHover!=null){const index=Math.max(0,Math.min(points.length-1,state.chartHover)),point=points[index],xx=x(index),yy=y(Number(point.unit_nav));c.strokeStyle='rgba(13,107,92,.42)';c.lineWidth=1;c.setLineDash([4,4]);c.beginPath();c.moveTo(xx,p.t);c.lineTo(xx,h-p.b);c.stroke();c.setLineDash([]);c.fillStyle='#fff';c.strokeStyle='#0d6b5c';c.lineWidth=2.5;c.beginPath();c.arc(xx,yy,4.5,0,Math.PI*2);c.fill();c.stroke();
        if(tooltip){tooltip.style.display='block';tooltip.innerHTML=`<span>${esc(point.date)}</span><b>${Number(point.unit_nav).toFixed(4)}</b><span>单日涨跌 ${fmtPct(point.daily_return_pct)}</span>`;const tooltipWidth=142;tooltip.style.left=`${Math.max(8,Math.min(w-tooltipWidth-8,xx+(xx>w*.68?-tooltipWidth-10:10)))}px`;tooltip.style.top=`${Math.max(8,yy-58)}px`}}
      else if(tooltip){tooltip.style.display='none'}
    }
    $('addButton').addEventListener('click',()=>addFund($('fundInput').value));$('fundInput').addEventListener('keydown',e=>{if(e.key==='Enter')addFund(e.target.value)});$('exampleButton').addEventListener('click',()=>addFund('026211'));window.addEventListener('resize',()=>{if(state.detailCode)drawChart()});renderWatchlist();
  </script>
</body>
